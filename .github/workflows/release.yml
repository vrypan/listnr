name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Test
        run: go test ./...

      # The release body comes from CHANGELOG.md rather than from commit
      # subjects, so upgrade notes (schema migrations, breaking changes) reach
      # the release page. A missing section fails the release rather than
      # silently publishing empty notes. The file is written outside the
      # working tree because `release --clean` refuses a dirty checkout.
      - name: Extract release notes from CHANGELOG.md
        run: |
          tag="$(git describe --tags --exact-match)"
          version="${tag#v}"
          awk -v hdr="## [$version]" '
            index($0, hdr) == 1 { found = 1; next }
            /^## \[/ { if (found) exit }
            found { print }
          ' CHANGELOG.md > "$RUNNER_TEMP/release-notes.md"
          if [ ! -s "$RUNNER_TEMP/release-notes.md" ]; then
            echo "CHANGELOG.md has no '## [$version]' section" >&2
            exit 1
          fi
          cat "$RUNNER_TEMP/release-notes.md"

      - name: Create GitHub release
        uses: goreleaser/goreleaser-action@v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean --release-notes=${{ runner.temp }}/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
