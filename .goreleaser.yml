version: 2

project_name: listnr

builds:
  - id: listnr
    main: .
    binary: listnr
    env:
      - CGO_ENABLED=0
    targets:
      - darwin_arm64
      - linux_amd64_v1
      - linux_arm64
    flags:
      - -trimpath
    ldflags:
      - >-
        -s -w
        -X github.com/vrypan/listnr/internal/buildinfo.Version={{ if .IsSnapshot }}{{ .Version }}{{ else }}{{ .Tag }}{{ end }}
        -X github.com/vrypan/listnr/internal/buildinfo.Commit={{ .FullCommit }}
        -X github.com/vrypan/listnr/internal/buildinfo.CommitTime={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: release
    ids:
      - listnr
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

# Unused for the GitHub release body: release.yml passes --release-notes built
# from CHANGELOG.md. This still applies to `goreleaser changelog` and snapshots.
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  prerelease: auto
